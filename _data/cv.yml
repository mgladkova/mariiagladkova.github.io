    Publications:
      - title: "TRASE: Trackiing-free 4D Segmentation and Editing"
        authors:
          - Yun-Jin Li, Mariia Gladkova, Yan Xia, and Daniel Cremers
        publisher: 2026 International Conference on 3D Vision (3DV)
        url: https://yunjinli.github.io/project-sadg/
        summary: A novel method for 4D segmentation and editing of dynamic scenes without the need for object tracking.

      - title: "VXP: Voxel-Cross-Pixel Large-scale Cross-Modal Place Recognition"
        authors:
          - Yun-Jin Li, Mariia Gladkova, Yan Xia, Rui Wang, and Daniel Cremers
        publisher: 2025 International Conference on 3D Vision (3DV)
        url: https://yunjinli.github.io/projects-vxp/
        summary: A large-scale cross-modal place recognition method that leverages voxel-cross-pixel local feature correspondences for improved retrieval performance.

      - title: "CASSPR: Cross Attention Single Scan Place Recognition"
        authors:
          - Yan Xia, Mariia Gladkova, Rui Wang, Qianyun Li, Uwe Stilla, Joao F. Henriques and Daniel Cremers
        publisher: 2023 International Conference on Computer Vision (ICCV)
        url: https://arxiv.org/abs/2211.12542
        summary: A novel method for single scan place recognition that utilizes cross attention mechanisms to effectively capture local and global features for improved retrieval performance.

      - title: "DirectTracker: 3D Multi-Object Tracking using Direct Image Alignment and Photometric Bundle Adjustment"
        authors:
          - Mariia Gladkova, Nikita Korobov, Nikolaus Demmel, Aljoša Ošep, Laura Leal-Taixé, and Daniel Cremers
        publisher: 2022 International Conference on Intelligent Robots and Systems (IROS)
        url: https://arxiv.org/abs/2209.14965
        summary: Leveraging modules from direct visual odometry for 3D multi-object detection and tracking.

      - title: "Tight Integration of Feature-based Relocalization in Monocular Direct Visual Odometry"
        authors:
          - Mariia Gladkova, Rui Wang, Niclas Zeller, and Daniel Cremers
        publisher: 2021 IEEE International Conference on Robotics & Automation (ICRA)
        url: https://arxiv.org/abs/2102.01191
        summary: A novel method for integrating feature-based relocalization into monocular direct visual odometry to improve robustness and accuracy.

